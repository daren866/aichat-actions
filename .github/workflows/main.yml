name: aichat

on:
  workflow_dispatch:
    inputs:
      speak:
        description: "提交给模型的指令/问题"
        required: true
        type: string

jobs:
  aichat:
    runs-on: ubuntu-latest

    env:
      # 自定义模型存储目录
      OLLAMA_MODELS: /home/runner/ollama_models

    steps:
      - name: Ensure curl
        run: |
          if ! command -v curl >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y curl
          fi

      # ---------- 1) 缓存 Ollama 主程序 (动态 key 防死锁) ----------
      - name: Cache Ollama binary
        id: cache-ollama-binary
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/ollama
          key: ollama-binary-ubuntu-latest-${{ github.run_id }}
          restore-keys: ollama-binary-ubuntu-latest-

      - name: Install Ollama (if not cached)
        if: steps.cache-ollama-binary.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "下载并缓存ollama成功"

      - name: Add ollama to PATH
        run: echo "/usr/local/bin" >> "$GITHUB_PATH"

      # ---------- 2) 缓存 Ollama 模型 (动态 key 防死锁) ----------
      - name: Cache Ollama models
        id: cache-ollama-models
        uses: actions/cache@v4
        with:
          path: ${{ env.OLLAMA_MODELS }}
          key: ollama-models-qwen3-0.6b-${{ github.run_id }}
          restore-keys: ollama-models-qwen3-0.6b-

      # ---------- 3) 先启动服务 (必须在 pull 之前) ----------
      - name: Start Ollama server in background
        run: |
          ollama serve &
          sleep 6
          echo "在后台开启服务器"

      # ---------- 4) 智能校验并拉取模型 ----------
      - name: Validate and pull qwen3:0.6b
        run: |
          MODEL_DIR="${OLLAMA_MODELS}/manifests/registry.ollama.ai/library/qwen3"
          BLOB_DIR="${OLLAMA_MODELS}/blobs"
          
          # 检查缓存是否真实有效（包含模型清单和大于1MB的真实文件）
          if [ -d "$MODEL_DIR" ] && [ "$(find "$BLOB_DIR" -type f -size +1M | wc -l)" -gt 0 ]; then
            echo "命中有效模型缓存，跳过下载"
          else
            echo "未命中有效模型缓存（或为198B空壳），清空并重新下载"
            rm -rf "${OLLAMA_MODELS:?}"/*
            ollama pull qwen3:0.6b
            echo "下载并缓存模型"
          fi

      # ---------- 5) 使用用户提交的 speak 调用模型 ----------
      - name: Run model with user speak
        run: |
          ollama run qwen3:0.6b "${{ github.event.inputs.speak }}"

      # ---------- 6) 结束 ----------
      - name: Finish
        run: echo "ai回复完成之后停止运行"
