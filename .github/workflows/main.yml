name: aichat

on:
  workflow_dispatch:
    inputs:
      speak:
        description: "提交给模型的指令/问题"
        required: true
        type: string

jobs:
  aichat:
    runs-on: ubuntu-latest

    env:
      OLLAMA_MODELS: /home/runner/ollama_models
      GGUF_DIR: /home/runner/gguf
      GGUF_FILE: Qwen3.5-0.8B-Q8_0.gguf
      MODEL_NAME: qwen35-q8

    steps:
      # ---------- 1) 缓存 Ollama 主程序 (升级 key 为 v5 强制更新最新版) ----------
      - name: Cache Ollama binary
        id: cache-ollama-binary
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/ollama
          key: ollama-binary-ubuntu-latest-v5

      - name: Install Ollama (if not cached)
        if: steps.cache-ollama-binary.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "Ollama installed and cached"

      - name: Add ollama to PATH
        run: echo "/usr/local/bin" >> "$GITHUB_PATH"

      # ---------- 2) 缓存 Q8_0 GGUF 文件 ----------
      - name: Cache GGUF model file
        id: cache-gguf
        uses: actions/cache@v4
        with:
          path: ${{ env.GGUF_DIR }}/${{ env.GGUF_FILE }}
          key: qwen35-08b-q8-gguf-v1

      # ---------- 3) 下载 GGUF ----------
      - name: Download Q8_0 GGUF from HuggingFace
        if: steps.cache-gguf.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$GGUF_DIR"
          curl -fL --retry 5 --retry-delay 5 -C - \
            -o "$GGUF_DIR/$GGUF_FILE" \
            "https://huggingface.co/unsloth/Qwen3.5-0.8B-GGUF/resolve/main/Qwen3.5-0.8B-Q8_0.gguf?download=true"
          SIZE=$(stat -c%s "$GGUF_DIR/$GGUF_FILE")
          if [ "$SIZE" -lt 1048576 ]; then
            echo "Downloaded file too small ($SIZE bytes), aborting"
            exit 1
          fi
          echo "GGUF downloaded: $SIZE bytes"

      # ---------- 4) 写入 Modelfile ----------
      - name: Write Modelfile
        run: |
          mkdir -p "$GGUF_DIR"
          cat > "$GGUF_DIR/Modelfile" <<'EOF'
          FROM /home/runner/gguf/Qwen3.5-0.8B-Q8_0.gguf
          EOF
          cat "$GGUF_DIR/Modelfile"

      # ---------- 5) 安装 llama-quantize 兜底 (解决旧版 Ollama 兼容性问题) ----------
      - name: Install llama-quantize binary
        run: |
          echo "Downloading llama.cpp pre-built binary to extract llama-quantize..."
          # 使用最新版的 llama.cpp release 链接，如果失效请去 github.com/ggerganov/llama.cpp/releases 替换
          curl -fsSL https://github.com/ggerganov/llama.cpp/releases/download/b3600/llama-b3600-bin-ubuntu-x64.zip -o llama.zip
          sudo apt-get update && sudo apt-get install -y unzip
          sudo unzip -j llama.zip "*llama-quantize*" -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/llama-quantize
          echo "llama-quantize installed successfully"
          rm -f llama.zip

      # ---------- 6) 启动 Ollama 服务 ----------
      - name: Start Ollama server in background
        run: |
          ollama serve > ollama.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -sf http://localhost:11434/api/version >/dev/null 2>&1; then
              echo "Ollama server is up"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:11434/api/version || { echo "server failed to start"; cat ollama.log; exit 1; }

      # ---------- 7) 注册自定义模型 ----------
      - name: Create custom model from GGUF
        run: |
          cd "$GGUF_DIR"
          # 如果最新版 Ollama 仍要求校验，刚才安装的 llama-quantize 会处理它
          ollama create "$MODEL_NAME" -f Modelfile
          ollama list

      # ---------- 8) 调用模型 ----------
      - name: Run model with user speak
        run: |
          ollama run "$MODEL_NAME" "${{ github.event.inputs.speak }}"

      # ---------- 9) 结束 ----------
      - name: Finish
        run: echo "ai回复完成之后停止运行"
